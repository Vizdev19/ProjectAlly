<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllyTracker</title>
    <style>
      :root {
        --bg:        #FFFFFF;
        --surface:   #F7F5F2;
        --surface-2: #EEEAE4;
        --ink:       #1A1424;
        --ink-2:     #4A4259;
        --muted:     #6B647A;
        --line:      #E2DDD6;
        --line-2:    #CFC9C0;
        --good:      #0B7B3A;
        --danger:    #C41C3C;
        --brand-grad: linear-gradient(115deg, #FF8A4C 0%, #FF4A8E 32%, #B254E8 64%, #5B6CFF 100%);
      }
      *      { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
